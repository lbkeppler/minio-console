name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            mc_url: https://dl.min.io/client/mc/release/linux-amd64/mc
            mc_name: mc
          - os: macos-latest
            target: x86_64-apple-darwin
            mc_url: https://dl.min.io/client/mc/release/darwin-amd64/mc
            mc_name: mc
          - os: macos-latest
            target: aarch64-apple-darwin
            mc_url: https://dl.min.io/client/mc/release/darwin-arm64/mc
            mc_name: mc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            mc_url: https://dl.min.io/client/mc/release/windows-amd64/mc.exe
            mc_name: mc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Download MinIO Client (mc)
        run: |
          mkdir -p src-tauri/bin
          curl -fSL "${{ matrix.mc_url }}" -o "src-tauri/bin/${{ matrix.mc_name }}"
          chmod +x "src-tauri/bin/${{ matrix.mc_name }}" || true
        shell: bash

      - run: npm ci

      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_CONFIG: >-
            {"bundle":{"resources":{"bin/${{ matrix.mc_name }}":"${{ matrix.mc_name }}"}}}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MinIO Console ${{ github.ref_name }}"
          releaseBody: |
            ## MinIO Console ${{ github.ref_name }}

            Cross-platform desktop application for MinIO server management.

            ### Included
            - MinIO Client (mc) bundled — [AGPL-3.0 License](https://github.com/minio/mc/blob/master/LICENSE), Copyright (C) MinIO, Inc.

            ### Downloads
            Choose the installer for your platform below.
          releaseDraft: true
          args: --target ${{ matrix.target }}
