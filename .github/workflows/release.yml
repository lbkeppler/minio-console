name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            mc_platform: windows-amd64
            mc_ext: .exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            mc_platform: darwin-arm64
            mc_ext: ""
          - platform: macos-13
            target: x86_64-apple-darwin
            mc_platform: darwin-amd64
            mc_ext: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            mc_platform: linux-amd64
            mc_ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Download mc binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          MC_URL="https://dl.min.io/client/mc/release/${{ matrix.mc_platform }}/mc${{ matrix.mc_ext }}"
          MC_OUT="src-tauri/binaries/mc-${{ matrix.target }}${{ matrix.mc_ext }}"
          curl -fSL "$MC_URL" -o "$MC_OUT"
          chmod +x "$MC_OUT"
          echo "Downloaded mc to $MC_OUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "MinIO Console v__VERSION__"
          releaseBody: |
            ## MinIO Console v__VERSION__

            Cross-platform desktop application for MinIO server management.

            ### Downloads
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` disk image
            - **Linux**: `.deb` package / `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
