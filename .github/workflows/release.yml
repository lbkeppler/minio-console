name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Suppress Node.js 20 deprecation warnings from action runtimes
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            build_target: x86_64-pc-windows-msvc
            mc_platform: windows-amd64
            mc_ext: .exe
            artifact_name: windows
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            build_target: universal-apple-darwin
            mc_platform: darwin-arm64
            mc_ext: ""
            artifact_name: macos-universal
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu
            mc_platform: linux-amd64
            mc_ext: ""
            artifact_name: linux
            artifact_path: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Download mc binary (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          MC_URL="https://dl.min.io/client/mc/release/${{ matrix.mc_platform }}/mc${{ matrix.mc_ext }}"
          MC_OUT="src-tauri/binaries/mc-${{ matrix.target }}${{ matrix.mc_ext }}"
          curl -fSL "$MC_URL" -o "$MC_OUT"
          chmod +x "$MC_OUT"

      - name: Download mc binaries (macOS universal — both archs)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          for arch_pair in "aarch64-apple-darwin:darwin-arm64" "x86_64-apple-darwin:darwin-amd64"; do
            target="${arch_pair%%:*}"
            platform="${arch_pair##*:}"
            curl -fSL "https://dl.min.io/client/mc/release/${platform}/mc" \
              -o "src-tauri/binaries/mc-${target}"
            chmod +x "src-tauri/binaries/mc-${target}"
          done

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.build_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MinIO Console ${{ github.ref_name }}"
          draft: true
          prerelease: false
          files: artifacts/**/*
          body: |
            ## MinIO Console ${{ github.ref_name }}

            Cross-platform desktop application for MinIO server management.

            ### Downloads
            - **Windows**: `.msi` or `-setup.exe` installer
            - **macOS** (Universal — Intel + Apple Silicon): `.dmg`
            - **Linux**: `.deb`, `.rpm`, or `.AppImage`

            The MinIO Client (`mc`) binary is bundled — no extra install required.
